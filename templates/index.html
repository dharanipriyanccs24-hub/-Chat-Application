<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Chat Application</title>\n    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>\n    <style>\n        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }\n        .chat-container { width: 400px; margin: 0 auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }\n        .messages { height: 300px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }\n        .message { margin: 5px 0; }\n        #messageInput { width: calc(100% - 100px); }\n        #sendButton { width: 80px; }\n    </style>\n</head>\n<body>\n    <div class="chat-container">\n        <h2>Chat Application</h2>\n        <div class="messages" id="messages"></div>\n        <input type="text" id="messageInput" placeholder="Type your message..." />\n        <button id="sendButton">Send</button>\n    </div>\n    <script>\n        const socket = io('http://localhost:3000');\n        const messagesContainer = document.getElementById('messages');\n        const messageInput = document.getElementById('messageInput');\n        const sendButton = document.getElementById('sendButton');\n\n        sendButton.addEventListener('click', () => {\n            const message = messageInput.value;\n            socket.emit('chat message', message);\n            messageInput.value = '';\n        });\n\n        socket.on('chat message', (msg) => {\n            const messageElement = document.createElement('div');\n            messageElement.classList.add('message');\n            messageElement.textContent = msg;\n            messagesContainer.appendChild(messageElement);\n            messagesContainer.scrollTop = messagesContainer.scrollHeight;\n        });\n    </script>\n</body>\n</html>\n
